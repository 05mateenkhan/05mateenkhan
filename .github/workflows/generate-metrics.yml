name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: General
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: 05mateenkhan
          config_timezone: Asia/Kolkata
          config_theme: tokyonight
          
          # Minimal layout
          config_order: base.metadata
          
          # Branch to push metrics to
          output_action: commit
          committer_branch: output
          committer_message: "chore: update metrics"
